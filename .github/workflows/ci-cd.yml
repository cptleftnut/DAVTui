name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io

jobs:
  # ============================================================================
  # CODE QUALITY & LINTING
  # ============================================================================
  
  lint:
    runs-on: ubuntu-latest
    name: Lint & Format Check
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm run install:all
      
      - name: Lint backend
        run: cd backend && npm run lint 2>/dev/null || true
      
      - name: Lint frontend
        run: cd frontend && npm run lint 2>/dev/null || true
      
      - name: Check formatting
        run: npm run format:check 2>/dev/null || true

  # ============================================================================
  # SECURITY SCANNING
  # ============================================================================
  
  security:
    runs-on: ubuntu-latest
    name: Security Scan
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm run install:all
      
      - name: Audit dependencies
        run: npm audit --audit-level=moderate 2>&1 | tee audit-report.txt
      
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: audit-report
          path: audit-report.txt

  # ============================================================================
  # BACKEND TESTS
  # ============================================================================
  
  backend-test:
    runs-on: ubuntu-latest
    name: Backend Tests
    
    services:
      sqlite:
        image: sqlite:latest
        options: >-
          --health-cmd="sqlite3 --version"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install backend dependencies
        run: cd backend && npm ci
      
      - name: Run backend tests
        run: cd backend && npm test 2>&1 | tee test-report.txt
        continue-on-error: true
      
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: backend-test-report
          path: backend/test-report.txt

  # ============================================================================
  # FRONTEND TESTS
  # ============================================================================
  
  frontend-test:
    runs-on: ubuntu-latest
    name: Frontend Tests
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      
      - name: Build frontend
        run: cd frontend && npm run build
      
      - name: Run frontend tests
        run: cd frontend && npm test 2>&1 | tee test-report.txt
        continue-on-error: true
      
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: frontend-test-report
          path: frontend/test-report.txt

  # ============================================================================
  # BUILD & ARTIFACTS
  # ============================================================================
  
  build:
    runs-on: ubuntu-latest
    name: Build Artifacts
    needs: [lint, security, backend-test, frontend-test]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm run install:all
      
      - name: Build backend
        run: cd backend && npm run build 2>/dev/null || true
      
      - name: Build frontend
        run: cd frontend && npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            frontend/dist/
            backend/

  # ============================================================================
  # DOCKER BUILD & PUSH
  # ============================================================================
  
  docker:
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # DEPLOYMENT
  # ============================================================================
  
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to server
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            cd /opt/davclaw
            git pull origin main
            npm run install:all
            npm run build
            systemctl restart davclaw
            systemctl status davclaw
          EOF
      
      - name: Verify deployment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          sleep 10
          curl -f http://$DEPLOY_HOST:3001/api/adb/devices || exit 1

  # ============================================================================
  # NOTIFICATIONS
  # ============================================================================
  
  notify:
    runs-on: ubuntu-latest
    name: Send Notifications
    needs: [lint, security, backend-test, frontend-test, build]
    if: always()
    
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.security.result }}" = "failure" ] || \
             [ "${{ needs.backend-test.result }}" = "failure" ] || \
             [ "${{ needs.frontend-test.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "DAVClaw CI/CD Pipeline ${{ steps.status.outputs.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*DAVClaw CI/CD Pipeline*\n*Status:* ${{ steps.status.outputs.status }}\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
